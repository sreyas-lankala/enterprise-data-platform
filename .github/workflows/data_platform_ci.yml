name: Data Platform CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  data-platform-validation:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dbt
      run: |
        pip install dbt-core
        pip install sqlfluff

    - name: Validate dbt Project
      run: |
        cd edp_dbt
        dbt parse

    - name: Lint SQL Files
      run: |
        sqlfluff lint sql_platform

    - name: Check Repository Structure
      run: |
        echo "Checking project structure..."
        ls -R

    - name: CI Completed
      run: echo "Enterprise Data Platform validation successful"
